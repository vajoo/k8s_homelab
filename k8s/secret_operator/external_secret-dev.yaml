apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dev-api-key
  namespace: default
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: dev-api-credentials
  data:
  - secretKey: api-key
    remoteRef:
      key: "dev"
      property: "api-key"
      version: "1"